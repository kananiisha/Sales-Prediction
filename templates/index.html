<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(45deg, #764ba2, #667eea);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>Sales Units Prediction</h3>
                    </div>
                    <div class="card-body">
                        <form id="predictionForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="itemCategory" class="form-label">Item Category</label>
                                    <select class="form-select" id="itemCategory" required>
                                        <option value="">Select Category</option>
                                        <option value="Food">Food</option>
                                        <option value="Non-Consumable">Non-Consumable</option>
                                        <option value="Drinks">Drinks</option>
                                        <!-- Add more options as needed -->
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="itemMRP" class="form-label">Item MRP</label>
                                    <input type="number" class="form-control" id="itemMRP" step="0.01" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="itemVisibility" class="form-label">Item Visibility</label>
                                    <input type="number" class="form-control" id="itemVisibility" step="0.01" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="itemFatContent" class="form-label">Item Fat Content</label>
                                    <select class="form-select" id="itemFatContent" required>
                                        <option value="">Select Fat Content</option>
                                        <option value="Low Fat">Low Fat</option>
                                        <option value="Regular">Regular</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="outletType" class="form-label">Outlet Type</label>
                                    <select class="form-select" id="outletType" required>
                                        <option value="">Select Outlet Type</option>
                                        <option value="Supermarket Type1">Supermarket Type1</option>
                                        <option value="Supermarket Type2">Supermarket Type2</option>
                                        <option value="Supermarket Type3">Supermarket Type3</option>
                                        <option value="Grocery Store">Grocery Store</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="outletSize" class="form-label">Outlet Size</label>
                                    <select class="form-select" id="outletSize" required>
                                        <option value="">Select Size</option>
                                        <option value="Small">Small</option>
                                        <option value="Medium">Medium</option>
                                        <option value="High">High</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="outletLocationType" class="form-label">Outlet Location Type</label>
                                    <select class="form-select" id="outletLocationType" required>
                                        <option value="">Select Location Type</option>
                                        <option value="Tier 1">Tier 1</option>
                                        <option value="Tier 2">Tier 2</option>
                                        <option value="Tier 3">Tier 3</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="outletEstablishmentYear" class="form-label">Outlet Establishment Year</label>
                                    <input type="number" class="form-control" id="outletEstablishmentYear" required>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="festivalFlag" class="form-label">Festival Flag</label>
                                    <select class="form-select" id="festivalFlag" required>
                                        <option value="">Select</option>
                                        <option value="0">No</option>
                                        <option value="1">Yes</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="discountPercentage" class="form-label">Discount Percentage</label>
                                    <input type="number" class="form-control" id="discountPercentage" step="0.01" required>
                                </div>
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn-lg">Predict Sales</button>
                            </div>
                        </form>
                        <div id="result" class="mt-4 text-center" style="display: none;">
                            <h4>Predicted Units Sold: <span id="prediction"></span></h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('predictionForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const data = {
                Item_Category: document.getElementById('itemCategory').value,
                Item_MRP: parseFloat(document.getElementById('itemMRP').value),
                Item_Visibility: parseFloat(document.getElementById('itemVisibility').value),
                Item_Fat_Content: document.getElementById('itemFatContent').value,
                Outlet_Type: document.getElementById('outletType').value,
                Outlet_Size: document.getElementById('outletSize').value,
                Outlet_Location_Type: document.getElementById('outletLocationType').value,
                Outlet_Establishment_Year: parseInt(document.getElementById('outletEstablishmentYear').value),
                Festival_Flag: parseInt(document.getElementById('festivalFlag').value),
                Discount_Percentage: parseFloat(document.getElementById('discountPercentage').value)
            };

            fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('prediction').textContent = result.predicted_units_sold.toFixed(2);
                document.getElementById('result').style.display = 'block';
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while making the prediction.');
            });
        });
    </script>
</body>
</html>
